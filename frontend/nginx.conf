server_tokens off;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://*.sentry.io https://sentry.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.sentry.io; font-src 'self'; connect-src 'self' https://*.sentry.io https://sentry.io; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # Never cache SPA shell; avoids stale index.html pointing to removed hashed chunks.
    location = /index.html {
        add_header Cache-Control "no-store";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://*.sentry.io https://sentry.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.sentry.io; font-src 'self'; connect-src 'self' https://*.sentry.io https://sentry.io; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
    }

    # Deny access to source map files (defense-in-depth)
    location ~ \.js\.map$ {
        deny all;
        return 404;
    }

    # Static assets must exist and should never fall back to index.html.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://*.sentry.io https://sentry.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.sentry.io; font-src 'self'; connect-src 'self' https://*.sentry.io https://sentry.io; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
    }

    # Cache immutable static assets aggressively.
    location ~* \.(css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://*.sentry.io https://sentry.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.sentry.io; font-src 'self'; connect-src 'self' https://*.sentry.io https://sentry.io; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
    }

    # SPA: route app URLs to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
