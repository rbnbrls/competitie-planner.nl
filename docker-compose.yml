version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://cpuser:cpdevpass@db:5432/competitieplanner
      - SECRET_KEY=dev-secret-key-change-in-production-min-64-chars-long-abcdef
      - CORS_ORIGINS=["http://localhost:5173"]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: competitieplanner
      POSTGRES_USER: cpuser
      POSTGRES_PASSWORD: cpdevpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpuser -d competitieplanner"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: