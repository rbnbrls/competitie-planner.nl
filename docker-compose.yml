version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - VITE_API_URL=/api/v1

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://cpuser:cpdevpass@db:5432/competitieplanner
      - SECRET_KEY=dev-secret-key-change-in-production-min-64-chars-long-abcdef-extra-padding-to-reach-limit-1234567890
      - CORS_ORIGINS=["http://localhost:5173", "http://127.0.0.1:5173", "http://meppers.localhost:5173", "http://meppers.lvh.me:5173"]
      - SUPER_ADMIN_EMAIL=admin@competitie-planner.nl
      - ENCRYPTION_KEY=07vC-wX7B-H_1m7L7y-q6V8w-Z2X3c-f4G5h-j8K9l-m0=
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: competitieplanner
      POSTGRES_USER: cpuser
      POSTGRES_PASSWORD: cpdevpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpuser -d competitieplanner"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: